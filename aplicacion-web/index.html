<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Sala de Servidores</title>
    <meta name="author" content="Fredy Bohle">
    <meta name="description" content="Panel de control para el monitoreo de la sala de servidores">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <link href="./img/favicon.ico" rel="icon" type="image/x-icon">
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
</head>
<body>

<div class="container py-5">
    <h1 class="text-center text-celeste mb-4 fw-bold">MONITOREO DE SALA DE SERVIDORES</h1>
    
    <!-- Estado de conexiones -->
    <div class="d-flex justify-content-center gap-3 mb-4">
        <span id="conexion-broker" class="badge bg-danger p-2 fs-6">Broker: Desconectado</span>
        <span id="conexion-nodemcu" class="badge bg-danger p-2 fs-6">NodeMCU: Desconectado</span>
    </div>

    <!-- Alertas del sistema -->
    <div id="contenedor-alerta" class="alert custom-alert text-center fw-bold mb-4" role="alert">
        <span id="val-alerta">Alertas: Esperando datos...</span>
    </div>

    <!-- Sensores -->
    <div class="row g-4 mb-4">
        <div class="col-md-6">
            <div class="card card-custom h-100 p-3 text-center">
                <h4 class="card-title text-muted">Temperatura</h4>
                <div id="val-temp" class="display-4 text-celeste fw-bold">-- °C</div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card card-custom h-100 p-3 text-center">
                <h4 class="card-title text-muted">Humedad</h4>
                <div id="val-hum" class="display-4 text-celeste fw-bold">-- %</div>
            </div>
        </div>
    </div>

    <!-- Estado -->
    <div class="row g-4 mb-4">
        <div class="col-md-6">
            <div class="card card-custom p-3 text-center">
                <h4 class="card-title text-muted">Estado del Ventilador</h4>
                <div id="val-vent" class="fs-2 text-light fw-bold">--</div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card card-custom p-3 text-center">
                <h4 class="card-title text-muted">Modo de Operación</h4>
                <div id="val-modo" class="fs-2 text-light fw-bold">--</div>
            </div>
        </div>
    </div>

    <!-- Panel de Control -->
    <div class="row g-4">
        <div class="col-md-4">
            <div class="card card-custom h-100 p-3 text-center">
                <h4 class="card-title text-celeste mb-3">Control de Modo</h4>
                <div class="d-grid gap-2">
                    <button class="btn btn-outline-success" onclick="enviarComando('modo', 'AUTO')">AUTOMÁTICO</button>
                    <button class="btn btn-outline-warning" onclick="enviarComando('modo', 'MANUAL')">MANUAL</button>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card card-custom h-100 p-3 text-center">
                <h4 class="card-title text-celeste mb-3">Control Ventilador</h4>
                <div class="d-grid gap-2">
                    <button class="btn btn-primary" onclick="enviarComando('ventilador', 'ON')">Encender (ON)</button>
                    <button class="btn btn-danger" onclick="enviarComando('ventilador', 'OFF')">Apagar (OFF)</button>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card card-custom h-100 p-3 text-center">
                <h4 class="card-title text-celeste mb-3">Configurar Umbrales</h4>
                
                <!-- Umbral de Temperatura -->
                <div class="input-group mb-2">
                    <span class="input-group-text bg-secondary text-light border-secondary">Temp</span>
                    <input type="number" id="input-umbral-temperatura" class="form-control bg-dark text-light border-secondary text-center" step="0.1">
                    <button class="btn btn-info text-dark fw-bold" onclick="configurarUmbralTemperatura()">Fijar</button>
                </div>

                <!-- Umbral de Humedad -->
                <div class="input-group mb-2">
                    <span class="input-group-text bg-secondary text-light border-secondary">Hum</span>
                    <input type="number" id="input-umbral-humedad" class="form-control bg-dark text-light border-secondary text-center" step="1">
                    <button class="btn btn-info text-dark fw-bold" onclick="configurarUmbralHumedad()">Fijar</button>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="./js/config.js"></script>
<script src="./js/app-MQTT.js"></script>

</body>
</html>
